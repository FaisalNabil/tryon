version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: tryon
      POSTGRES_PASSWORD: tryon
      POSTGRES_DB: tryon
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  rembg:
    build: ../ml/rembg-service
    restart: unless-stopped
    ports:
      - '5000:5000'

volumes:
  pgdata:
