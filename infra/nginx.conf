# infra/nginx.conf
# Production Nginx reverse proxy for Hetzner CX21 VPS
#
# Setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/tryon
#   sudo ln -s /etc/nginx/sites-available/tryon /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.yourdomain.com -d app.yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx

# ── API ──────────────────────────────────────────────────────────────
server {
    server_name api.yourdomain.com;
    listen 80;

    # Proxy to Node.js API on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # CORS headers for widget (all origins)
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Increase body size for frame image uploads (5MB)
    client_max_body_size 10M;
}

# ── Dashboard ────────────────────────────────────────────────────────
server {
    server_name app.yourdomain.com;
    listen 80;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── SSL (Certbot adds this block automatically) ─────────────────────
# Do NOT add this manually — run: sudo certbot --nginx
# It will add the HTTPS server blocks and redirect HTTP → HTTPS
