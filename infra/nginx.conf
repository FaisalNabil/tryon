# infra/nginx.conf
# Production Nginx reverse proxy for Hetzner CX21 VPS
#
# Setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/tryon
#   sudo ln -s /etc/nginx/sites-available/tryon /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.yourdomain.com -d app.yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx

# ── Rate limiting zone (shared across workers) ───────────────────────
# 10 requests/second per IP, burst up to 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── Gzip compression ─────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 256;
gzip_comp_level 5;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml;

# ── API ──────────────────────────────────────────────────────────────
server {
    server_name api.yourdomain.com;
    listen 80;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Node.js API on port 3000
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Proxy buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        # CORS headers for widget (all origins)
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-API-Key" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Increase body size for frame image uploads
    client_max_body_size 10M;
}

# ── Dashboard ────────────────────────────────────────────────────────
server {
    server_name app.yourdomain.com;
    listen 80;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── SSL (Certbot adds this block automatically) ─────────────────────
# Do NOT add this manually — run: sudo certbot --nginx
# It will add the HTTPS server blocks and redirect HTTP → HTTPS
